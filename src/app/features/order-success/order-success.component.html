<div class="success-page abstract-theme">
  <div class="success-container kinetic-landscape">
    
    <div class="status-section">
      <div class="scan-line"></div>
      <div class="status-content">
        <span class="status-code">[ OK ]</span>
        <h1 class="success-title">TRANSACTION_COMPLETE</h1>
        <p class="sys-note">NODE_CONFIRMED // ARCHIVE_SYNCED</p>
      </div>
    </div>

    <div class="data-section">
      <div class="order-id-plate">
        <div class="plate-label">REF_NUMBER</div>
        <div class="plate-value">{{ orderNumber }}</div>
        <div class="plate-barcode"></div>
      </div>

      <div class="action-zone">
        <button class="brutalist-btn" routerLink="/catalog">
          <span class="btn-text">RETURN_TO_INDEX</span>
          <span class="btn-arrow">→</span>
        </button>
      </div>
    </div>

  </div>
</div>
